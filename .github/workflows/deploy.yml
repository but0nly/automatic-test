name: Deploy Next.js to Ubuntu Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auto_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/auto_test_db?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            --network host \
            --build-arg DATABASE_URL=$DATABASE_URL \
            --build-arg REDIS_URL=$REDIS_URL \
            -t automatic-test-app:latest \
            .
            
      - name: Save Docker Image to Tar
        run: docker save automatic-test-app:latest | gzip > automatic-test-app.tar.gz

      - name: Transfer Image to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "automatic-test-app.tar.gz"
          target: "/tmp/"

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd apps/automatic-test/
            
            git fetch --all
            git reset --hard origin/main
            
            # Load the pre-built image
            gunzip -c /tmp/automatic-test-app.tar.gz | sudo docker load
            
            # Remove the tar file to save space
            rm /tmp/automatic-test-app.tar.gz
            
            # Start the container (will use the loaded image, no building on server)
            sudo docker compose up -d
            
            # Clean up old unused images
            sudo docker image prune -f
