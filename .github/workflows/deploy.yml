name: Deploy Next.js to Ubuntu Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Require permissions to push to GitHub Container Registry
    permissions:
      contents: read
      packages: write
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auto_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/auto_test_db?schema=public
      REDIS_URL: redis://localhost:6379
      IMAGE_NAME: ghcr.io/but0nly/automatic-test-app:latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build \
            --network host \
            --build-arg DATABASE_URL=$DATABASE_URL \
            --build-arg REDIS_URL=$REDIS_URL \
            -t ${{ env.IMAGE_NAME }} \
            .
            
          docker push ${{ env.IMAGE_NAME }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: SSH Deploy
        run: |
          # Use EOF to pass multiline script to the remote server securely
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ConnectTimeout=60 -o IPQoS=cs0 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd apps/automatic-test/
            
            git fetch --all
            git reset --hard origin/main
            
            # Log in to GitHub Container Registry on the server
            # We use the standard GITHUB_TOKEN passed as an environment variable in Actions
            # However, since this script runs ON the server, secrets are evaluated before SSH sends it
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the image directly via fast HTTPS (bypasses any SSH size/time limits!)
            sudo docker pull ghcr.io/but0nly/automatic-test-app:latest
            
            # Start the container
            sudo docker compose up -d
            
            # Clean up old unused images
            sudo docker image prune -f
          EOF
