name: Deploy Next.js to Ubuntu Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auto_test_db
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/auto_test_db?schema=public
      REDIS_URL: redis://localhost:6379
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Build
        run: pnpm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 这里的路径替换为你服务器上项目的实际路径
            cd apps/automatic-test/
            
            # 放弃所有本地修改，强制拉取最新代码（防止因为有本地修改导致 Git 需要合并冲突而卡住）
            git fetch --all
            git reset --hard origin/main
            
            # 重新构建 Docker 镜像（使用 plain 进度输出，这样能实时看到日志，防止在 GitHub 界面上看起来像卡死了）
            sudo docker compose build --progress=plain
            
            # 启动容器
            sudo docker compose up -d
            
            # 清理无用的镜像
            sudo docker image prune -f
